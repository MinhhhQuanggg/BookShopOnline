<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUTECH - Quản Lý Sách</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b6fd6;
            --primary-2: #6f87e7;
            --primary-soft: #f1ebff;
            --border: rgba(139, 111, 214, 0.15);
            --text: #1f2130;
            --muted: #6f6b80;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(139, 111, 214, 0.12), transparent 28%),
                radial-gradient(circle at top right, rgba(111, 135, 231, 0.12), transparent 24%),
                linear-gradient(180deg, #f7f3ff 0%, #ffffff 100%);
        }

        .page-layer {
            position: relative;
            z-index: 1;
        }

        .navbar {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
            padding: 0.7rem 0;
            border-bottom: none;
        }

        .navbar .container-fluid {
            padding-left: 1.15rem;
            padding-right: 1.15rem;
        }

        .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff !important;
            font-size: 1.05rem;
            font-weight: 900;
        }

        .navbar-brand i {
            color: #ffffff;
        }

        .navbar-toggler {
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .navbar-toggler-icon {
            filter: brightness(0) invert(1);
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.25);
        }

        .navbar-nav {
            align-items: center;
            gap: 0.8rem;
        }

        .nav-compact {
            font-size: 0.95rem;
        }

        .navbar-nav .nav-link,
        .navbar-nav .dropdown-toggle,
        .btn-logout,
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem !important;
            border-radius: 999px;
            color: #ffffff !important;
            opacity: 0.9;
            font-weight: 600;
            border: 1px solid transparent;
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .dropdown-toggle:hover,
        .btn-logout:hover,
        .btn-login:hover {
            background: rgba(255, 255, 255, 0.15);
            opacity: 1;
            transform: translateY(-1px);
        }

        .navbar-nav .nav-link i,
        .navbar-nav .dropdown-toggle i,
        .btn-logout i,
        .btn-login i {
            color: rgba(255, 255, 255, 0.9);
        }

        .dropdown-menu {
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(121, 100, 166, 0.12);
            padding: 0.45rem;
        }

        .dropdown-item {
            border-radius: 10px;
            padding: 0.65rem 0.85rem;
            font-weight: 600;
        }

        .dropdown-item:hover {
            background: var(--primary-soft);
        }

        main,
        .container,
        .card,
        .book-card,
        .search-bar,
        .error-container {
            color: var(--text) !important;
        }

        main {
            flex: 1;
            padding: 2rem 0 5rem;
        }

        .container {
            max-width: 1240px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(121, 100, 166, 0.10);
            background: rgba(255, 255, 255, 0.96);
        }

        .btn {
            border-radius: 999px;
            font-weight: 700;
            border: none;
            transition: all 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #41d19d 0%, #2abf82 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f06b8a 0%, #ef4f68 100%);
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            background: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(139, 111, 214, 0.55);
            box-shadow: 0 0 0 0.22rem rgba(139, 111, 214, 0.14);
        }

        .alert {
            border: none;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(121, 100, 166, 0.08);
        }

        .table {
            border-radius: 16px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
            color: white;
        }

        .table tbody tr:hover {
            background-color: rgba(139, 111, 214, 0.04);
        }

        .badge {
            border-radius: 999px;
            font-weight: 700;
            padding: 0.55rem 0.9rem;
        }

        footer {
            background: rgba(255, 255, 255, 0.88);
            border-top: 1px solid var(--border);
            color: var(--muted);
            text-align: center;
            padding: 1.2rem 0;
            margin-top: auto;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 991.98px) {
            .navbar-nav {
                align-items: stretch;
                gap: 0.5rem;
                padding-top: 0.75rem;
            }

            .navbar-nav .nav-link,
            .navbar-nav .dropdown-toggle,
            .btn-logout,
            .btn-login {
                justify-content: flex-start;
                border-radius: 14px;
                background: #fff;
                border: 1px solid var(--border);
            }

            .dropdown-menu {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="page-layer">
        <header th:fragment="header">
            <style>
                /* Dynamic Navbar Styles Injected by Fragment */
                .navbar {
                    background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%) !important;
                    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25) !important;
                    border-bottom: none !important;
                }

                .navbar-brand {
                    background: rgba(255, 255, 255, 0.15) !important;
                    border: 1px solid rgba(255, 255, 255, 0.2) !important;
                    color: #ffffff !important;
                }

                .navbar-brand i {
                    color: #ffffff !important;
                }

                .navbar-toggler {
                    border: 1px solid rgba(255, 255, 255, 0.5) !important;
                }

                .navbar-toggler-icon {
                    filter: brightness(0) invert(1) !important;
                }

                .navbar-nav {
                    gap: 0.8rem !important;
                }

                .navbar-nav .nav-link,
                .navbar-nav .dropdown-toggle,
                .btn-login {
                    color: #ffffff !important;
                    opacity: 0.9 !important;
                    font-weight: 600 !important;
                    padding: 0.5rem 0.75rem !important;
                }

                .navbar-nav .nav-link:hover,
                .navbar-nav .dropdown-toggle:hover,
                .btn-login:hover {
                    background: rgba(255, 255, 255, 0.15) !important;
                    opacity: 1 !important;
                }

                .navbar-nav .nav-link i,
                .navbar-nav .dropdown-toggle i,
                .btn-login i {
                    color: rgba(255, 255, 255, 0.9) !important;
                }
            </style>
            <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">
                        <i class="fas fa-book-open"></i>
                        <span>HUTECH Books</span>
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto nav-compact">
                            <li class="nav-item"><a class="nav-link" href="/"><i
                                        class="fas fa-home"></i><span>Home</span></a></li>
                            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN','USER')"><a class="nav-link"
                                    th:href="@{/books}"><i class="fas fa-list"></i><span>Danh sách</span></a></li>
                            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN','USER')"><a class="nav-link"
                                    th:href="@{/books/add}"><i class="fas fa-plus-circle"></i><span>Thêm sách</span></a>
                            </li>
                            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN','USER')"><a class="nav-link"
                                    th:href="@{/cart}"><i class="fas fa-shopping-cart"></i><span>Giỏ hàng</span></a>
                            </li>
                            <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link"
                                    th:href="@{/chat}"><i class="fas fa-comments"></i><span>Chat</span></a></li>
                            <li class="nav-item dropdown" sec:authorize="hasAuthority('ADMIN')">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                    aria-expanded="false"><i class="fas fa-shield-halved me-1"></i><span>Quản
                                        trị</span></a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><a class="dropdown-item" th:href="@{/inventory}"><i
                                                class="fas fa-warehouse me-2"></i>Kho sách</a></li>
                                    <li><a class="dropdown-item" th:href="@{/admin/users}"><i
                                                class="fas fa-users me-2"></i>Users</a></li>
                                    <li><a class="dropdown-item" th:href="@{/categories}"><i
                                                class="fas fa-folder-open me-2"></i>Categories</a></li>
                                </ul>
                            </li>
                            <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                    aria-expanded="false"><i class="fas fa-user-circle me-1"></i><span
                                        sec:authentication="name">User</span></a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li><span class="dropdown-item-text text-muted small">Đã đăng nhập</span></li>
                                    <li>
                                        <hr class="dropdown-divider">
                                    </li>
                                    <li>
                                        <form th:action="@{/logout}" method="post" class="px-0 m-0">
                                            <button class="dropdown-item w-100 fw-bold border-0 text-danger"
                                                type="submit"><i class="fas fa-right-from-bracket me-2 text-danger"></i>
                                                Đăng xuất</button>
                                        </form>
                                    </li>
                                </ul>
                            </li>
                            <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="btn btn-login"
                                    th:href="@{/login}"><i class="fas fa-right-to-bracket"></i><span>Đăng
                                        nhập</span></a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <th:block th:fragment="link-css">
            <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        </th:block>

        <th:block th:fragment="custom-css">
            <style>
                body {
                    background:
                        radial-gradient(circle at top left, rgba(139, 111, 214, 0.14), transparent 30%),
                        radial-gradient(circle at top right, rgba(111, 135, 231, 0.14), transparent 26%),
                        linear-gradient(180deg, #f7f3ff 0%, #ffffff 100%);
                }
            </style>
        </th:block>

        <main>
            <div class="container">
                <div layout:fragment="content"></div>
            </div>
        </main>

        <footer th:fragment="footer" class="app-footer">
            <div class="container">
                <p class="mb-0">&copy; 2026 - Ứng dụng Quản lý Sách</p>
                <small class="mt-2 d-block">Powered by <a href="https://www.hutech.edu.vn/" target="_blank"
                        rel="noopener noreferrer">HUTECH</a></small>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var footer = document.querySelector('.app-footer');
                    function syncFooterSpace() {
                        if (!footer) return;
                        document.body.style.paddingBottom = footer.offsetHeight + 'px';
                    }
                    document.querySelectorAll('[data-autohide]').forEach(function (el) {
                        var ms = parseInt(el.getAttribute('data-autohide') || '', 10);
                        if (!Number.isFinite(ms) || ms <= 0) return;
                        window.setTimeout(function () { el.style.display = 'none'; }, ms);
                    });
                    syncFooterSpace();
                    window.addEventListener('resize', syncFooterSpace);
                });
            </script>
        </footer>

        <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/js/jquery-3.7.0.min.js}"></script>
    </div>
</body>

</html>
