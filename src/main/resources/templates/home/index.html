<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng Quản lý Sách</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f4fd, #f5fbff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Hero section */
        .home-hero {
            background: linear-gradient(135deg, #6ec1e4, #a3d9f5);
            color: #ffffff;
            border-radius: 18px;
            padding: 50px 30px;
            margin-top: 60px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        .home-hero h1 {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .home-hero p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 0;
        }

        footer {
            background-color: #f8f9fa;
            padding: 20px 0;
            margin-top: 60px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
<!-- HEADER -->
<header th:replace="~{layout :: header}"></header>

<!-- CONTAINER -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="home-hero">
                <h1>Chào mừng bạn!</h1>
                <p>
                    Đây là hệ thống quản lý sách sử dụng <strong>Spring Boot</strong>
                    <br>
                    Kết nối cơ sở dữ liệu <strong>MySQL</strong>
                    <br>
                    Giao diện đơn giản · Hiện đại · Dễ sử dụng
                </p>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer th:replace="~{layout :: footer}"></footer>

<script th:src="@{/js/bootstrap.min.js}"></script>
<script th:src="@{/js/jquery-3.7.0.min.js}"></script>
</body>
</html>
