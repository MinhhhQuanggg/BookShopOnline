<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách loại sách</title>
    <style>
        .category-wrap {
            margin-top: 0.5rem;
        }

        .category-card {
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid rgba(139, 111, 214, 0.14);
            box-shadow: 0 16px 40px rgba(121, 100, 166, 0.10);
            background: rgba(255, 255, 255, 0.95);
        }

        .category-head {
            background: linear-gradient(135deg, #6f87e7 0%, #8b6fd6 100%);
            color: white;
            padding: 1rem 1.2rem;
        }

        .category-head h4 {
            margin: 0;
            font-weight: 900;
        }

        .category-body {
            padding: 0;
        }

        .category-empty {
            padding: 3.5rem 1.5rem;
            text-align: center;
            color: #6f6b80;
        }

        .category-table th,
        .category-table td {
            vertical-align: middle;
        }

        .category-table thead {
            background: rgba(139, 111, 214, 0.08);
        }

        .btn-soft-warning:hover {
            background-color: #ffc107;
            color: #000;
        }

        .btn-soft-danger:hover {
            background-color: #ef4f68;
            color: #fff;
        }

        .badge-soft {
            background: rgba(139, 111, 214, 0.12);
            color: #8b6fd6;
            padding: 0.55rem 0.85rem;
            border-radius: 999px;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="category-wrap">
    <div class="category-card">
        <div class="category-head d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h4><i class="fas fa-folder-open me-2"></i>Danh sách loại sách</h4>
            <a th:href="@{/categories/add}" class="btn btn-light btn-sm fw-bold px-3 py-2 shadow-sm">
                <i class="fas fa-plus-circle me-1"></i> Thêm loại mới
            </a>
        </div>

        <div class="category-body">
            <div th:if="${categories.empty}" class="category-empty">
                <i class="fas fa-box-open fa-3x text-muted opacity-50 mb-3"></i>
                <h5 class="text-muted">Chưa có loại sách nào.</h5>
                <p class="text-muted small mb-0">Hãy bắt đầu bằng cách thêm một loại sách mới!</p>
            </div>

            <div th:if="${!categories.empty}" class="table-responsive">
                <table class="table table-hover align-middle mb-0 category-table">
                    <thead>
                        <tr>
                            <th class="ps-4" style="width: 80px;">ID</th>
                            <th>Tên loại</th>
                            <th class="text-end pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categories}">
                            <td class="ps-4">
                                <span class="badge badge-soft fw-bold" th:text="${category.id}"></span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${category.name}"></div>
                            </td>
                            <td class="text-end pe-4">
                                <div class="btn-group">
                                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-sm btn-outline-warning rounded-pill me-2 px-3 shadow-none btn-soft-warning">
                                        <i class="fas fa-edit me-1"></i> Sửa
                                    </a>
                                    <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-none btn-soft-danger"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa loại sách này?')">
                                        <i class="fas fa-trash me-1"></i> Xóa
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
