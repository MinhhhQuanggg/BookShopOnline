<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh Sách Loại Sách</title>
</head>
<body>
<div layout:fragment="content" class="container mt-4">
    <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
        <div class="card-header bg-gradient-primary text-white py-3 d-flex justify-content-between align-items-center" 
             style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <h4 class="mb-0 fw-bold">
                <i class="fas fa-folder-open me-2"></i>Danh Sách Loại Sách
            </h4>
            <a th:href="@{/categories/add}" class="btn btn-light btn-sm fw-bold px-3 py-2 shadow-sm">
                <i class="fas fa-plus-circle me-1"></i> Thêm Loại Mới
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${categories.empty}" class="p-5 text-center">
                <div class="mb-3">
                    <i class="fas fa-box-open fa-3x text-muted opacity-50"></i>
                </div>
                <h5 class="text-muted">Chưa có loại sách nào.</h5>
                <p class="text-muted small">Hãy bắt đầu bằng cách thêm một loại sách mới!</p>
            </div>
            
            <div th:if="${!categories.empty}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-uppercase small fw-bold text-muted">
                        <tr>
                            <th class="ps-4" style="width: 80px;">ID</th>
                            <th>Tên Loại</th>
                            <th class="text-end pe-4">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categories}" class="transition-all hover-translate-y">
                            <td class="ps-4">
                                <span class="badge bg-soft-primary text-primary fw-bold" 
                                      style="background: rgba(102, 126, 234, 0.1); color: #667eea; padding: 0.5rem 0.8rem; border-radius: 8px;"
                                      th:text="${category.id}"></span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${category.name}"></div>
                            </td>
                            <td class="text-end pe-4">
                                <div class="btn-group">
                                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" 
                                       class="btn btn-sm btn-outline-warning rounded-pill me-2 px-3 shadow-none">
                                        <i class="fas fa-edit me-1"></i> Sửa
                                    </a>
                                    <a th:href="@{/categories/delete/{id}(id=${category.id})}" 
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-none"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa loại sách này?')">
                                        <i class="fas fa-trash me-1"></i> Xóa
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <style>
        .hover-translate-y { transition: all 0.2s ease; }
        .hover-translate-y:hover { transform: translateY(-2px); background-color: rgba(0,0,0,0.02) !important; }
        .btn-outline-warning:hover { background-color: #ffc107; color: #000; }
        .btn-outline-danger:hover { background-color: #dc3545; color: #fff; }
    </style>
</div>
</body>
</html>
