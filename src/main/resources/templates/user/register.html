<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - HUTECH Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem 2rem;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h2 {
            color: #333;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: #999;
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0.75rem 1.2rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.3rem rgba(102, 126, 234, 0.1);
            background-color: white;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 1.5rem;
            animation: slideIn 0.5s ease-out;
        }

        .alert-danger {
            background-color: #fff5f5;
            color: #c53030;
        }

        .alert-success {
            background-color: #f0fff4;
            color: #22543d;
        }

        .error-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .error-list li {
            padding: 0.3rem 0;
            display: flex;
            align-items: center;
        }

        .error-list li::before {
            content: "×";
            font-weight: bold;
            margin-right: 0.5rem;
        }

        .password-group {
            position: relative;
        }

        .eye-toggle {
            cursor: pointer;
            color: #667eea;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .form-group .small {
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-card">
        <!-- Header -->
        <div class="register-header">
            <h2><i class="fas fa-user-plus" style="color: #667eea; margin-right: 0.5rem;"></i>Đăng Ký</h2>
            <p>Tạo tài khoản mới</p>
        </div>

        <!-- Error Alert -->
        <div th:if="${errors}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i> Vui lòng kiểm tra lại thông tin:
            <ul class="error-list mt-2">
                <li th:each="error : ${errors}" th:text="${error}"></li>
            </ul>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" method="post" th:object="${user}">
            <div class="form-group">
                <label for="username" class="form-label">Tên đăng nhập *</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" 
                       placeholder="Nhập tên đăng nhập (1-50 ký tự)" required>
                <div th:if="${#fields.hasErrors('username')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{username}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email *</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" 
                       placeholder="Nhập địa chỉ email" required>
                <div th:if="${#fields.hasErrors('email')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{email}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Số điện thoại *</label>
                <input type="tel" id="phone" th:field="*{phone}" class="form-control" 
                       placeholder="Nhập số điện thoại (10 chữ số)" required>
                <small class="text-muted">Vd: 0123456789</small>
                <div th:if="${#fields.hasErrors('phone')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{phone}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Mật khẩu *</label>
                <div class="password-group">
                    <input type="password" id="password" th:field="*{password}" class="form-control" 
                           placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
                    <i class="fas fa-eye eye-toggle" onclick="togglePassword('password')"></i>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{password}"></span>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-check-circle"></i> Đăng Ký
            </button>
        </form>

        <!-- Login Link -->
        <div class="login-link">
            <span>Đã có tài khoản?</span><br>
            <a href="/login">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const passwordInput = document.getElementById(fieldId);
        const icon = event.target;
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
