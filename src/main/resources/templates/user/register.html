<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - HUTECH Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b6fd6;
            --primary-2: #6f87e7;
            --surface: rgba(255,255,255,0.94);
            --border: rgba(139, 111, 214, 0.14);
            --text: #1f2130;
            --muted: #6f6b80;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(139, 111, 214, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(111, 135, 231, 0.18), transparent 28%),
                linear-gradient(135deg, #f7f3ff 0%, #ece8ff 48%, #ffffff 100%);
            padding: 24px 12px;
        }

        .register-container {
            width: 100%;
            max-width: 520px;
        }

        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: 0 24px 60px rgba(121, 100, 166, 0.16);
            padding: 2.4rem 2rem;
            backdrop-filter: blur(12px);
        }

        .register-header { text-align: center; margin-bottom: 2rem; }
        .register-header h2 {
            color: var(--text);
            font-weight: 900;
            font-size: 1.9rem;
            margin-bottom: 0.4rem;
        }
        .register-header p { color: var(--muted); margin: 0; }

        .form-group { margin-bottom: 1.15rem; }
        .form-label {
            font-weight: 800;
            color: #37324a;
            margin-bottom: 0.55rem;
            display: block;
        }
        .form-control {
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 0.82rem 1.05rem;
            background: #fff;
        }
        .form-control:focus {
            border-color: rgba(139, 111, 214, 0.55);
            box-shadow: 0 0 0 0.22rem rgba(139, 111, 214, 0.14);
        }

        .btn-register {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 0.9rem 1rem;
            margin-top: 0.6rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
            box-shadow: 0 12px 28px rgba(111, 135, 231, 0.22);
        }

        .btn-register:hover { transform: translateY(-1px); }

        .alert {
            border: none;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(121, 100, 166, 0.08);
            margin-bottom: 1.2rem;
        }
        .alert-danger { background: #fff5f8; color: #c53452; }

        .error-list { list-style: none; padding: 0; margin: 0; }
        .error-list li { padding: 0.25rem 0; }
        .error-list li::before { content: "•"; margin-right: 0.5rem; font-weight: 900; color: var(--primary); }

        .password-group { position: relative; }
        .eye-toggle {
            cursor: pointer;
            color: var(--primary);
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
        }
        .login-link a { color: var(--primary); font-weight: 800; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .text-muted { color: var(--muted) !important; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <h2><i class="fas fa-user-plus" style="color: var(--primary); margin-right: 0.5rem;"></i>Đăng Ký</h2>
            <p>Tạo tài khoản mới</p>
        </div>

        <div th:if="${errors}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i> Vui lòng kiểm tra lại thông tin:
            <ul class="error-list mt-2">
                <li th:each="error : ${errors}" th:text="${error}"></li>
            </ul>
        </div>

        <form th:action="@{/register}" method="post" th:object="${user}">
            <div class="form-group">
                <label for="username" class="form-label">Tên đăng nhập *</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Nhập tên đăng nhập (1-50 ký tự)" required>
                <div th:if="${#fields.hasErrors('username')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{username}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email *</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Nhập địa chỉ email" required>
                <div th:if="${#fields.hasErrors('email')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{email}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Số điện thoại *</label>
                <input type="tel" id="phone" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại (10 chữ số)" required>
                <small class="text-muted">Ví dụ: 0123456789</small>
                <div th:if="${#fields.hasErrors('phone')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{phone}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Mật khẩu *</label>
                <div class="password-group">
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
                    <i class="fas fa-eye eye-toggle" onclick="togglePassword('password')"></i>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="text-danger mt-2" style="font-size: 0.85rem;">
                    <i class="fas fa-exclamation"></i> <span th:errors="*{password}"></span>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-check-circle"></i> Đăng Ký
            </button>
        </form>

        <div class="login-link">
            <span>Đã có tài khoản?</span><br>
            <a href="/login">Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const passwordInput = document.getElementById(fieldId);
        const icon = event.target;
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
