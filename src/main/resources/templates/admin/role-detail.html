<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi ti?t Role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .role-badge {
            font-weight: 700;
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            display: inline-block;
        }

        .role-admin {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .role-user {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .role-guest {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            color: #2d3436;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
        }

        .btn-gradient:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            color: white;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main class="container pb-5 pt-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb bg-white p-3 rounded-4 shadow-sm">
                <li class="breadcrumb-item"><a href="/home" class="text-decoration-none">Trang ch?</a></li>
                <li class="breadcrumb-item"><a href="/admin/roles" class="text-decoration-none">Qu?n lý Roles</a></li>
                <li class="breadcrumb-item active" aria-current="page">Chi ti?t Role</li>
            </ol>
        </nav>

        <div class="row g-4">
            <!-- Thông tin Role -->
            <div class="col-lg-4">
                <div class="card h-100 p-4">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <span th:text="${role.name}"
                                th:classappend="${role.name == 'ADMIN'} ? 'role-badge role-admin' : (${role.name == 'GUEST'} ? 'role-badge role-guest' : 'role-badge role-user')"
                                class="role-badge fs-4 shadow-sm"></span>
                        </div>
                        <h4 class="fw-bold mb-1">Mã Role: #<span th:text="${role.id}"></span></h4>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="text-muted fw-bold small">Mô t?</label>
                        <p class="fs-5" th:text="${role.description ?: 'Chua có mô t?'}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="text-muted fw-bold small">Th?ng kê</label>
                        <div class="d-flex align-items-center mt-2">
                            <div class="bg-light rounded-3 p-3 w-100 border">
                                <i class="fas fa-users text-primary me-2"></i>
                                <span class="fw-bold fs-5" th:text="${userCount}">0</span>
                                <span class="text-muted"> ngu?i dùng dang gi? vai trò này</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-auto pt-3">
                        <a href="/admin/roles" class="btn btn-outline-secondary w-100">
                            <i class="fas fa-arrow-left me-2"></i>Quay l?i danh sách
                        </a>
                    </div>
                </div>
            </div>

            <!-- Danh sách Users -->
            <div class="col-lg-8">
                <div class="card h-100 p-4">
                    <h4 class="fw-bold mb-4 border-bottom pb-3">
                        <i class="fas fa-users me-2 text-primary"></i>Danh sách ngu?i dùng
                    </h4>

                    <div class="table-responsive" th:if="${not #lists.isEmpty(role.users)}">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Provider</th>
                                    <th class="text-end">Hành d?ng</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${role.users}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="user-avatar me-3"
                                                th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</div>
                                            <div>
                                                <div class="fw-bold" th:text="${user.username}">Username</div>
                                                <small class="text-muted" th:text="'ID: ' + ${user.id}"></small>
                                            </div>
                                        </div>
                                    </td>
                                    <td th:text="${user.email}">user@example.com</td>
                                    <td>
                                        <span class="badge bg-secondary"
                                            th:text="${user.provider ?: 'LOCAL'}">LOCAL</span>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                            class="btn btn-sm btn-outline-primary rounded-pill">
                                            <i class="fas fa-eye"></i> Chi ti?t
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${#lists.isEmpty(role.users)}" class="text-center py-5 text-muted">
                        <i class="fas fa-user-slash fa-3x mb-3 opacity-50"></i>
                        <p>Chua có ngu?i dùng nào du?c gán vai trò này.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
