<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Người Dùng - HUTECH Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem 2rem;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .btn-gradient:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main class="container pb-5 pt-4">
        <div class="header-card">
            <h2 class="m-0 fw-bold text-gradient">
                <i class="fas fa-user-plus me-2"></i>Thêm người dùng mới
            </h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="register-card">
                    <!-- Error Alert -->
                    <div th:if="${errors}" class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> Vui lòng kiểm tra lại thông tin:
                        <ul class="mb-0 mt-2">
                            <li th:each="error : ${errors}" th:text="${error}"></li>
                        </ul>
                    </div>

                    <!-- Form -->
                    <form th:action="@{/admin/users/add}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Tên đăng nhập *</label>
                            <input type="text" id="username" th:field="*{username}" class="form-control"
                                placeholder="Nhập tên đăng nhập" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email *</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control"
                                placeholder="Nhập địa chỉ email" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Số điện thoại *</label>
                            <input type="tel" id="phone" th:field="*{phone}" class="form-control"
                                placeholder="Nhập số điện thoại" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Mật khẩu *</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control"
                                placeholder="Nhập mật khẩu" required>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="/admin/users" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-gradient px-4">
                                <i class="fas fa-save me-2"></i>Lưu người dùng
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
