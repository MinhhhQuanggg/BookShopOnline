<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Người dùng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .profile-header {
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            height: 150px;
            border-radius: 20px 20px 0 0;
            position: relative;
        }

        .profile-avatar-container {
            position: absolute;
            bottom: -50px;
            left: 50px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .profile-avatar img,
        .profile-avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-avatar-placeholder {
            background: linear-gradient(45deg, #85FFBD 0%, #FFFB7D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #555;
        }

        .role-badge {
            font-weight: 700;
            border-radius: 99px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .role-admin {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .role-user {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
    </style>
</head>

<body>
    <header th:replace="~{layout :: header}"></header>

    <main class="container pb-5 pt-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-5">
            <ol class="breadcrumb bg-white p-3 rounded-4 shadow-sm">
                <li class="breadcrumb-item"><a href="/home" class="text-decoration-none">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="/admin/users" class="text-decoration-none">Quản lý Users</a></li>
                <li class="breadcrumb-item active" aria-current="page">Chi tiết User</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar-container">
                            <div class="profile-avatar">
                                <div class="profile-avatar-placeholder"
                                    th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</div>
                            </div>
                        </div>
                    </div>

                    <div class="card-body pt-5 px-5 pb-4">
                        <div class="d-flex justify-content-between align-items-start mt-2">
                            <div>
                                <h2 class="fw-bold mb-1" th:text="${user.username}">Username</h2>
                                <p class="text-muted mb-3"><i class="fas fa-envelope me-2"></i><span
                                        th:text="${user.email}">user@example.com</span></p>
                            </div>
                            <span class="badge bg-light text-dark border px-3 py-2">
                                <i class="fas fa-id-card me-2"></i>ID: <span th:text="${user.id}">1</span>
                            </span>
                        </div>

                        <hr class="my-4">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <h5 class="fw-bold mb-3 text-primary"><i class="fas fa-info-circle me-2"></i>Thông tin
                                    tài khoản</h5>
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item px-0 d-flex justify-content-between">
                                        <span class="text-muted">Nhà cung cấp</span>
                                        <span class="fw-semibold text-uppercase"
                                            th:text="${user.provider ?: 'LOCAL'}">LOCAL</span>
                                    </li>
                                    <li class="list-group-item px-0 d-flex justify-content-between">
                                        <span class="text-muted">Số điện thoại</span>
                                        <span class="fw-semibold"
                                            th:text="${user.phone ?: 'Chưa cập nhật'}">0909090909</span>
                                    </li>
                                    <li class="list-group-item px-0 d-flex justify-content-between">
                                        <span class="text-muted">Trạng thái</span>
                                        <span class="badge bg-success">Active</span>
                                    </li>
                                </ul>
                            </div>

                            <div class="col-md-6">
                                <h5 class="fw-bold mb-3 text-primary"><i class="fas fa-user-shield me-2"></i>Vai trò &
                                    Quyền hạn</h5>
                                <div class="d-flex flex-wrap gap-2">
                                    <th:block th:if="${not #lists.isEmpty(user.roles)}">
                                        <span th:each="role : ${user.roles}" th:text="${role.name}"
                                            th:classappend="${role.name == 'ADMIN'} ? 'role-badge role-admin' : 'role-badge role-user'">
                                        </span>
                                    </th:block>
                                    <span th:if="${#lists.isEmpty(user.roles)}" class="text-muted fst-italic">Chưa có
                                        vai trò nào</span>
                                </div>
                                <div class="mt-3">
                                    <a href="/admin/users" class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit me-1"></i>Quản lý Role
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-2">
                            <a href="/admin/users" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Quay lại
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
