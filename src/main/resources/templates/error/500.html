<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Lỗi Máy Chủ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); padding: 1rem 0; }
        .navbar-brand { font-size: 1.5rem; font-weight: 800; color: white !important; margin-left: 2rem; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); }
        .error-code { font-size: 5rem; font-weight: 900; color: #e74c3c; margin-bottom: 1rem; }
        .error-title { font-size: 1.8rem; font-weight: 700; color: #333; margin-bottom: 1rem; }
        .error-message { font-size: 1rem; color: #666; margin-bottom: 2rem; }
        .btn-home { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0.8rem 2rem; border-radius: 10px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); color: white; }
        footer { margin-top: auto; padding: 2rem; text-align: center; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="fas fa-book"></i> HUTECH Books
        </a>
    </div>
</nav>

<main>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-title"><i class="fas fa-exclamation-triangle text-danger"></i> Lỗi Máy Chủ Nội Bộ</div>
        <div class="error-message">
            <p>Máy chủ gặp lỗi không mong muốn và không thể hoàn thành yêu cầu của bạn.</p>
            <p class="text-muted small">Vui lòng kiểm tra nhật ký máy chủ để biết thêm chi tiết.</p>
        </div>
        <a href="/" class="btn-home"><i class="fas fa-home"></i> Quay về trang chủ</a>
    </div>
</main>

<footer>
    <div class="container">
        <p class="mb-0">&copy; 2026 - Ứng dụng Quản lý Sách | Spring Boot & MySQL</p>
        <small class="mt-2 d-block">Powered by HUTECH</small>
    </div>
</footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
