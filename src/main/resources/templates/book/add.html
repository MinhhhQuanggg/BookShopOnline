<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sách - HUTECH Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            max-width: 700px;
            margin: 0 auto 3rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-label {
            font-weight: 700;
            color: #333;
            margin-bottom: 0.8rem;
            display: block;
            font-size: 1rem;
        }

        .form-label .required {
            color: #ef4444;
            margin-left: 0.3rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.3rem rgba(102, 126, 234, 0.1);
            background-color: white;
        }

        .form-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.4rem;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: block;
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 2rem;
        }

        .alert-danger {
            background-color: #fff5f5;
            color: #c53030;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            justify-content: flex-end;
        }

        .btn-submit {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
            color: white;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            color: white;
        }

        .form-icon {
            color: #667eea;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
<!-- HEADER -->
<header th:replace="~{layout :: header}"></header>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-plus-circle"></i> Thêm Sách Mới</h1>
    </div>
</div>

<main>
    <div class="container">
        <div class="form-container">
            <!-- ERROR ALERT -->
            <div th:if="${errors}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> Vui lòng kiểm tra lại thông tin:
                <ul class="mt-2">
                    <li th:each="error : ${errors}" th:text="${error}"></li>
                </ul>
            </div>

            <!-- FORM -->
            <form th:action="@{/books/add}" th:object="${book}" method="post">
                <!-- Title -->
                <div class="form-group">
                    <label for="title" class="form-label">
                        <i class="fas fa-heading form-icon"></i>Tiêu Đề Sách <span class="required">*</span>
                    </label>
                    <input type="text" class="form-control" id="title" th:field="*{title}"
                           placeholder="Nhập tiêu đề sách" required autofocus>
                    <small class="form-text">Nhập tên sách hoặc tiêu đề chính xác</small>
                    <span th:if="${#fields.hasErrors('title')}" class="error-message" th:errors="*{title}"></span>
                </div>

                <!-- Author -->
                <div class="form-group">
                    <label for="author" class="form-label">
                        <i class="fas fa-pen-fancy form-icon"></i>Tác Giả <span class="required">*</span>
                    </label>
                    <input type="text" class="form-control" id="author" th:field="*{author}"
                           placeholder="Nhập tên tác giả">
                    <small class="form-text">Tên người sáng tác tác phẩm</small>
                    <span th:if="${#fields.hasErrors('author')}" class="error-message" th:errors="*{author}"></span>
                </div>

                <!-- Price -->
                <div class="form-group">
                    <label for="price" class="form-label">
                        <i class="fas fa-tag form-icon"></i>Giá Bán <span class="required">*</span>
                    </label>
                    <input type="number" class="form-control" id="price" th:field="*{price}"
                           placeholder="Nhập giá bán (VNĐ)" required step="1" min="0" max="1000000000">
                    <small class="form-text">Nhập giá tính theo đơn vị VNĐ</small>
                    <span th:if="${#fields.hasErrors('price')}" class="error-message" th:errors="*{price}"></span>
                </div>

                <!-- Stock -->
                <div class="form-group">
                    <label for="stock" class="form-label">
                        <i class="fas fa-boxes-stacked form-icon"></i>Tồn kho <span class="required">*</span>
                    </label>
                    <input type="number" class="form-control" id="stock" th:field="*{stock}"
                           placeholder="Nhập số lượng tồn kho" required step="1" min="0" max="1000000">
                    <small class="form-text">Số lượng sản phẩm có thể bán</small>
                    <span th:if="${#fields.hasErrors('stock')}" class="error-message" th:errors="*{stock}"></span>
                </div>

                <!-- Active -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-toggle-on form-icon"></i>Trạng thái bán
                    </label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="active" th:field="*{active}" checked>
                        <label class="form-check-label" for="active">Đang bán (Active)</label>
                    </div>
                    <small class="form-text">Tắt nếu muốn ẩn/không cho mua sản phẩm</small>
                    <span th:if="${#fields.hasErrors('active')}" class="error-message" th:errors="*{active}"></span>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="category" class="form-label">
                        <i class="fas fa-list form-icon"></i>Danh Mục <span class="required">*</span>
                    </label>
                    <select class="form-select" id="category" name="category.id" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"></option>
                    </select>
                    <small class="form-text">Chọn danh mục phù hợp cho sách</small>
                </div>

                <!-- ACTIONS -->
                <div class="form-actions">
                    <a href="/books" class="btn-cancel">
                        <i class="fas fa-times"></i> Hủy
                    </a>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-save"></i> Thêm Sách
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<!-- FOOTER -->
<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
