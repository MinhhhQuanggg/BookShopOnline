<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>HUTECH - API Book List</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div th:replace="~{layout :: header}"></div>

    <main class="container my-5">
        <div class="card p-4">
<!--            <h2 class="mb-4">HƯỚNG DẪN: Giao diện hiển thị danh sách Books bằng API</h2>-->
            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th sec:authorize="hasAnyAuthority('ADMIN')">Action</th>
                        </tr>
                    </thead>
                    <tbody id="book-table-body">
                        <!-- Content loaded via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>

    <script th:src="@{/js/jquery-3.7.0.min.js}"></script>
    <script th:inline="javascript">
        $(document).ready(function () {
            // Lấy dữ liệu từ API
            $.ajax({
                url: '/api/v1/books',
                type: 'GET',
                dataType: 'json',
                success: function (data) {
                    let trHTML = '';
                    $.each(data, function (i, item) {
                        trHTML += '<tr id="book-' + item.id + '">' +
                            '<td>' + item.id + '</td>' +
                            '<td>' + item.title + '</td>' +
                            '<td>' + item.author + '</td>' +
                            '<td>' + item.price + '</td>' +
                            '<td>' + item.categoryName + '</td>';

                        /*[# sec:authorize="hasAnyAuthority('ADMIN')"]*/
                        trHTML += '<td>' +
                            '<a href="/books/edit/' + item.id + '" class="btn btn-sm btn-outline-primary me-2"><i class="fas fa-edit"></i> Edit</a>' +
                            '<a href="javascript:void(0)" class="btn btn-sm btn-outline-danger" onclick="apiDeleteBook(' + item.id + ')"><i class="fas fa-trash"></i> Delete</a>' +
                            '</td>';
                        /*[/]*/

                        trHTML += '</tr>';
                    });
                    $('#book-table-body').append(trHTML);
                },
                error: function (xhr, status, error) {
                    console.error("Error fetching books:", error);
                }
            });
        });

        // Xoá bằng API
        function apiDeleteBook(id) {
            if (confirm('Are you sure you want to delete this book?')) {
                $.ajax({
                    url: '/api/v1/books/' + id,
                    type: 'DELETE',
                    success: function () {
                        alert('Book deleted successfully!');
                        $('#book-' + id).remove();
                    },
                    error: function (xhr, status, error) {
                        alert("Error deleting book: " + (xhr.responseText || error));
                    }
                });
            }
        }
    </script>
</body>

</html>
