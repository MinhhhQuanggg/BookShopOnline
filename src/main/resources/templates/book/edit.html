<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sách - HUTECH Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b6fd6;
            --primary-2: #6f87e7;
            --surface: rgba(255,255,255,0.95);
            --border: rgba(139, 111, 214, 0.14);
            --text: #1f2130;
            --muted: #6f6b80;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(139, 111, 214, 0.14), transparent 30%),
                radial-gradient(circle at top right, rgba(111, 135, 231, 0.12), transparent 26%),
                linear-gradient(180deg, #f7f3ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 12px 30px rgba(121, 100, 166, 0.16);
        }
        .form-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 18px 44px rgba(121, 100, 166, 0.12);
            padding: 2.2rem;
            max-width: 760px;
            margin: 0 auto 3rem;
            backdrop-filter: blur(12px);
        }
        .form-group { margin-bottom: 1.4rem; }
        .form-label { font-weight: 800; color: #37324a; margin-bottom: 0.65rem; display: block; }
        .form-label .required { color: #ef4f68; margin-left: 0.25rem; }
        .form-control, .form-select {
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 0.92rem 1.1rem;
            background: #fff;
        }
        .form-control:focus, .form-select:focus {
            border-color: rgba(139, 111, 214, 0.55);
            box-shadow: 0 0 0 0.22rem rgba(139, 111, 214, 0.14);
        }
        .form-text { font-size: 0.86rem; color: var(--muted); }
        .error-message { color: #ef4f68; font-size: 0.9rem; margin-top: 0.5rem; display: block; }
        .alert { border: none; border-radius: 14px; box-shadow: 0 8px 24px rgba(121, 100, 166, 0.08); }
        .alert-danger { background: #fff5f8; color: #c53452; }
        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end; }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0.95rem 1.6rem;
            font-weight: 800;
            box-shadow: 0 12px 28px rgba(111, 135, 231, 0.22);
        }
        .btn-cancel {
            background: #f3efff;
            color: var(--primary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.95rem 1.6rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .form-icon { color: var(--primary); margin-right: 0.5rem; }
        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.18);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .page-header h1 { font-weight: 900; margin: 0; }
    </style>
</head>
<body>
<header th:replace="~{layout :: header}"></header>

<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-edit me-2"></i>Chỉnh sửa sách</h1>
    </div>
</div>

<main>
    <div class="container">
        <div class="form-container">
            <span class="info-badge">
                <i class="fas fa-info-circle"></i> Mã sách: <span th:text="${book.id}"></span>
            </span>

            <div th:if="${errors}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i> Vui lòng kiểm tra lại thông tin:
                <ul class="mt-2 mb-0">
                    <li th:each="error : ${errors}" th:text="${error}"></li>
                </ul>
            </div>

            <form th:action="@{/books/edit}" th:object="${book}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="title" class="form-label"><i class="fas fa-heading form-icon"></i>Tiêu đề sách <span class="required">*</span></label>
                    <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="Nhập tiêu đề sách" required autofocus>
                    <small class="form-text">Nhập tên sách hoặc tiêu đề chính xác</small>
                    <span th:if="${#fields.hasErrors('title')}" class="error-message" th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label for="author" class="form-label"><i class="fas fa-pen-fancy form-icon"></i>Tác giả <span class="required">*</span></label>
                    <input type="text" class="form-control" id="author" th:field="*{author}" placeholder="Nhập tên tác giả">
                    <small class="form-text">Tên người sáng tác tác phẩm</small>
                    <span th:if="${#fields.hasErrors('author')}" class="error-message" th:errors="*{author}"></span>
                </div>

                <div class="form-group">
                    <label for="price" class="form-label"><i class="fas fa-tag form-icon"></i>Giá bán <span class="required">*</span></label>
                    <input type="number" class="form-control" id="price" th:field="*{price}" placeholder="Nhập giá bán (VNĐ)" required step="1" min="0" max="1000000000">
                    <small class="form-text">Nhập giá tính theo đơn vị VNĐ</small>
                    <span th:if="${#fields.hasErrors('price')}" class="error-message" th:errors="*{price}"></span>
                </div>

                <div class="form-group">
                    <label for="stock" class="form-label"><i class="fas fa-boxes-stacked form-icon"></i>Tồn kho <span class="required">*</span></label>
                    <input type="number" class="form-control" id="stock" th:field="*{stock}" placeholder="Nhập số lượng tồn kho" required step="1" min="0" max="1000000">
                    <small class="form-text">Số lượng sản phẩm có thể bán</small>
                    <span th:if="${#fields.hasErrors('stock')}" class="error-message" th:errors="*{stock}"></span>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-toggle-on form-icon"></i>Trạng thái bán</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="active" th:field="*{active}">
                        <label class="form-check-label" for="active">Đang bán (Active)</label>
                    </div>
                    <small class="form-text">Tắt nếu muốn ẩn/không cho mua sản phẩm</small>
                    <span th:if="${#fields.hasErrors('active')}" class="error-message" th:errors="*{active}"></span>
                </div>

                <div class="form-group">
                    <label for="category" class="form-label"><i class="fas fa-list form-icon"></i>Danh mục <span class="required">*</span></label>
                    <select class="form-select" id="category" name="category.id" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}" th:selected="${category.id == book.category.id}"></option>
                    </select>
                    <small class="form-text">Chọn danh mục phù hợp cho sách</small>
                </div>

                <div class="form-actions">
                    <a href="/books" class="btn-cancel"><i class="fas fa-times me-2"></i>Hủy</a>
                    <button type="submit" class="btn-submit"><i class="fas fa-save me-2"></i>Cập nhật</button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
